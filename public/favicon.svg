      <stop stop-color="#101820"/>
      <stop offset="0.54" stop-color="#1d2440"/>
      <stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <linearGradient id="glass" x1="18" y1="13" x2="48" y2="51" gradientUnits="userSpaceOnUse">
